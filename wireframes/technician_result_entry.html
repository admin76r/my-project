<!doctype html>
<html>
<head><meta charset="utf-8"><title>Technician - Result Entry</title>
<style>body{font-family:Arial;padding:12px} .row{display:flex;gap:12px} label{display:block;font-weight:600}</style>
</head>
<body>
<h3>Enter Results — Sample: SAMP-0001</h3>
<div>Patient: Rita Sharma | DOB: 1985-04-01</div>
<form>
  <div class="row">
    <div>
      <label>Test</label>
      <div>Hemoglobin</div>
    </div>
    <div>
      <label>Value</label>
      <input type="text" name="hb" value="">
    </div>
    <div>
      <label>Unit</label>
      <div>g/dL</div>
    </div>
    <div>
      <label>Ref Range</label>
      <div>12.0 - 16.0</div>
    </div>
  </div>
  <p>
    <button type="submit">Save Draft</button>
    <button type="button">Send to Verifier</button>
  </p>
</form>
</body>
</html>
